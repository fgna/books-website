<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1280" />
<title>Freyas Bibliothek</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #e8e8e5;
    --paper-2: #dcdcd9;
    --paper-3: #c4c4c0;
    --ink: #1c1c1e;
    --ink-2: #38383a;
    --ink-3: #6a6a6d;
    --ink-4: #98989b;
    --rule: #b8b8b4;
    --oxblood: #8a3324;
    --oxblood-dk: #5a1f15;
    --brass: #8e7d5c;
    --olive: #6b6843;
    --teal: #3a5d5a;
    --plum: #4a2a3a;
    --indigo: #2d3a5a;
    --sienna: #9a5e2e;

    --serif: "EB Garamond", "Iowan Old Style", "Palatino", Georgia, serif;
    --sans: "Manrope", -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: "JetBrains Mono", "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background: var(--paper); color: var(--ink); height: 100%; overflow: hidden; }
  body {
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(120,120,124,0.05), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(60,60,64,0.04), transparent 40%);
  }
  ::selection { background: var(--ink); color: var(--paper); }

  /* Typographic primitives */
  .display { font-family: var(--serif); font-weight: 500; letter-spacing: -0.02em; line-height: 1; }
  .mono { font-family: var(--mono); font-size: 11px; letter-spacing: 0.02em; text-transform: uppercase; color: var(--ink-3); }
  .label { font-family: var(--sans); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); font-weight: 600; }
  .rule { height: 1px; background: var(--rule); width: 100%; }

  /* Paper texture overlay */
  body::before {
    content: "";
    position: fixed; inset: 0;
    background-image:
      repeating-linear-gradient(0deg, rgba(26,22,18,0.012) 0px, rgba(26,22,18,0.012) 1px, transparent 1px, transparent 3px),
      repeating-linear-gradient(90deg, rgba(26,22,18,0.012) 0px, rgba(26,22,18,0.012) 1px, transparent 1px, transparent 3px);
    pointer-events: none;
    z-index: 1;
    mix-blend-mode: multiply;
    opacity: 0.6;
  }
  #app { position: relative; z-index: 2; }

  button { font: inherit; color: inherit; }

  /* Loading state */
  .boot {
    position: fixed; inset: 0;
    display: grid; place-items: center;
    background: var(--paper);
    z-index: 100;
    transition: opacity .4s ease;
  }
  .boot.hidden { opacity: 0; pointer-events: none; }
  .boot-inner { text-align: center; }
  .boot-mark { font-family: var(--serif); font-size: 36px; font-weight: 500; letter-spacing: -0.02em; }
  .boot-sub { font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-3); margin-top: 12px; }
  .boot-bar { width: 140px; height: 1px; background: var(--rule); margin: 18px auto 0; overflow: hidden; }
  .boot-bar::after {
    content: ""; display: block; height: 100%; width: 40%;
    background: var(--ink);
    animation: bootbar 1.4s infinite ease-in-out;
  }
  @keyframes bootbar {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(350%); }
  }
</style>
</head>
<body>
  <div id="boot" class="boot">
    <div class="boot-inner">
      <div class="boot-mark">die Bibliothek</div>
      <div class="boot-sub">Indexing 602 volumes</div>
      <div class="boot-bar"></div>
    </div>
  </div>
  <div id="app"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="config.js"></script>
  <script>
    (function() {
      // Redirect mobile browsers to the touch-optimised view
      if (/Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
        window.location.replace('mobile.html');
      }
      var name = (window.LIB_CONFIG && window.LIB_CONFIG.name) || 'die Bibliothek';
      document.title = name;
      var el = document.querySelector('.boot-mark');
      if (el) el.textContent = name;
    })();
  </script>
  <script type="text/babel" src="i18n.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="views.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
