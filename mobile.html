<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>die Bibliothek — mobil</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #e8e8e5;
    --paper-2: #dcdcd9;
    --paper-3: #c4c4c0;
    --ink: #1c1c1e;
    --ink-2: #38383a;
    --ink-3: #6a6a6d;
    --ink-4: #98989b;
    --rule: #b8b8b4;
    --oxblood: #8a3324;
    --brass: #8e7d5c;

    --serif: "EB Garamond", "Iowan Old Style", "Palatino", Georgia, serif;
    --sans: "Manrope", -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: "JetBrains Mono", "SF Mono", Menlo, monospace;

    --safe-top: env(safe-area-inset-top, 0);
    --safe-bot: env(safe-area-inset-bottom, 0);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; background: var(--paper); color: var(--ink); }
  body {
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    overscroll-behavior-y: none;
  }
  ::selection { background: var(--ink); color: var(--paper); }
  button { font: inherit; color: inherit; background: none; border: none; padding: 0; cursor: pointer; }
  input { font: inherit; }

  .display { font-family: var(--serif); font-weight: 500; letter-spacing: -0.02em; line-height: 1.05; }
  .mono { font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--ink-3); }
  .label { font-family: var(--sans); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); font-weight: 600; }

  /* Boot */
  .boot { position: fixed; inset: 0; display: grid; place-items: center; background: var(--paper); z-index: 100; transition: opacity .4s ease; }
  .boot.hidden { opacity: 0; pointer-events: none; }
  .boot-mark { font-family: var(--serif); font-size: 32px; font-weight: 500; letter-spacing: -0.02em; text-align: center; }
  .boot-sub { font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-3); margin-top: 10px; text-align: center; }
  .boot-bar { width: 120px; height: 1px; background: var(--rule); margin: 16px auto 0; overflow: hidden; }
  .boot-bar::after { content: ""; display: block; height: 100%; width: 40%; background: var(--ink); animation: bootbar 1.4s infinite ease-in-out; }
  @keyframes bootbar { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }
</style>
</head>
<body>
  <div id="boot" class="boot">
    <div>
      <div class="boot-mark">die Bibliothek</div>
      <div class="boot-sub">602 volumes</div>
      <div class="boot-bar"></div>
    </div>
  </div>
  <div id="app"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="config.js"></script>
  <script>
    (function() {
      // Redirect desktop browsers to the full view
      if (!/Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
        window.location.replace('index.html');
      }
      var name = (window.LIB_CONFIG && window.LIB_CONFIG.name) || 'die Bibliothek';
      document.title = name;
      var el = document.querySelector('.boot-mark');
      if (el) el.textContent = name;
    })();
  </script>
  <script type="text/babel" src="i18n.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="mobile-app.jsx"></script>
</body>
</html>
